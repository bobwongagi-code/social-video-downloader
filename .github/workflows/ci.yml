name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python files
        run: python3 -m py_compile scripts/constants.py scripts/deps.py scripts/cache.py scripts/urls.py scripts/net.py scripts/hls.py scripts/tiktok_resolver.py scripts/media_probe.py scripts/kpi.py scripts/download_social_video.py scripts/validate_repo.py tests/test_download_social_video.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Validate repository metadata
        run: python3 scripts/validate_repo.py

      - name: Check diff formatting
        run: git diff --check
