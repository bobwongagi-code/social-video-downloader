name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: python3 -m py_compile scripts/download_social_video.py scripts/validate_repo.py tests/test_download_social_video.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Validate repository metadata
        run: python3 scripts/validate_repo.py

      - name: Check diff formatting
        run: git diff --check
